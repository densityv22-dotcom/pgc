<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PK Craft Hub | Live Voting Directory</title>
    <meta name="google-site-verification" content="rZ6D-OMLgqRw6SOFJanKTfowRrYiSUWr2CWue3IObQ4" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f19; overflow-x: hidden; }
        .text-gradient { background: linear-gradient(135deg, #ff0055 0%, #ff5500 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .creator-card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .creator-card:hover { transform: translateY(-4px); }
        .shimmer {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: loading-shimmer 1.5s infinite linear;
        }
        @keyframes loading-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col selection:bg-red-500 selection:text-white">

    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3 animate__animated animate__fadeIn">
                <div class="bg-gradient-to-tr from-red-600 to-orange-500 p-2 rounded-xl text-white shadow-lg shadow-red-600/30">
                    <i class="fa-solid fa-cubes text-xl"></i>
                </div>
                <span class="font-extrabold text-xl tracking-tight text-white">PK<span class="text-red-500">Craft</span>Hub</span>
            </div>
            
            <div class="flex items-center gap-4 sm:gap-6 animate__animated animate__fadeIn">
                <nav class="flex items-center gap-4 sm:gap-6">
                    <a href="./index.html" class="text-sm font-bold text-red-500 border-b-2 border-red-500 pb-1">Leaderboard</a>
                    <a href="./videos.html" class="text-sm font-medium text-slate-400 hover:text-white transition-colors">Trending</a>
                </nav>

                <button id="btn-register-channel" onclick="openRegisterModal()" class="hidden items-center gap-2 px-3 py-1.5 sm:px-4 sm:py-2 rounded-xl bg-slate-800 hover:bg-slate-700 text-xs sm:text-sm font-semibold transition-all border border-slate-700/50 hover:border-red-500/50">
                    <i class="fa-solid fa-square-plus text-red-500"></i> <span class="hidden md:inline">Register Channel</span>
                </button>

                <button id="btn-login" class="flex items-center gap-2 px-4 py-2 rounded-xl bg-red-600 hover:bg-red-500 text-xs sm:text-sm font-bold transition-all text-white shadow-lg active:scale-95">
                    <i class="fa-brands fa-google"></i> Login
                </button>

                <div id="user-profile-badge" class="hidden items-center gap-3 bg-slate-800/80 p-1.5 pr-4 rounded-full border border-slate-700/50 shadow-inner">
                    <img id="user-avatar" src="" alt="Avatar" class="w-8 h-8 rounded-full bg-slate-700 object-cover">
                    <div class="text-xs">
                        <p id="user-display-name" class="font-bold text-slate-200 max-w-[100px] truncate">Loading...</p>
                        <p id="user-vote-status" class="text-emerald-400 font-medium flex items-center gap-1"></p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <div class="text-center max-w-2xl mx-auto mb-12 animate__animated animate__fadeIn">
            <span class="bg-red-500/10 text-red-400 text-xs font-bold px-3 py-1.5 rounded-full border border-red-500/20 tracking-wider uppercase inline-block mb-3">Community Hub v2.5</span>
            <h1 class="text-3xl sm:text-5xl font-extrabold tracking-tight text-white mb-4">
                Pakistani Minecraft <br><span class="text-gradient">Creator Leaderboard</span>
            </h1>
        </div>

        <div class="max-w-md mx-auto mb-12 animate__animated animate__fadeIn">
            <div class="relative group">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 transition-colors group-focus-within:text-red-500"></i>
                <input type="text" id="search-bar" placeholder="Search YouTuber or In-game Name..." class="w-full bg-slate-900/60 backdrop-blur border border-slate-800 rounded-2xl pl-12 pr-4 py-3 text-sm text-white focus:outline-none focus:border-red-500/80 transition-all placeholder:text-slate-600 shadow-xl">
            </div>
        </div>

        <div id="podium-container" class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-4xl mx-auto mb-12 items-end"></div>

        <div class="border-t border-slate-900/80 my-8"></div>

        <h3 class="text-base font-bold text-slate-400 mb-6 flex items-center gap-2"><i class="fa-solid fa-list-ol text-red-500"></i> Full Directory Standings</h3>
        <div id="creator-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="shimmer h-40 rounded-2xl border border-slate-800/50"></div>
            <div class="shimmer h-40 rounded-2xl border border-slate-800/50"></div>
            <div class="shimmer h-40 rounded-2xl border border-slate-800/50"></div>
        </div>
    </main>

    <div id="register-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-slate-900 border border-slate-800 rounded-3xl max-w-md w-full p-6 shadow-2xl relative">
            <button onclick="closeRegisterModal()" class="absolute right-5 top-5 text-slate-500 hover:text-slate-300 transition-colors">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
            <div class="mb-5">
                <h3 class="text-xl font-bold text-white flex items-center gap-2"><i class="fa-brands fa-youtube text-red-500"></i> Connect Profile</h3>
            </div>
            <form id="channel-registration-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-1.5">Minecraft IGN</label>
                    <input type="text" id="reg-ign" required placeholder="e.g., GetBetterLt3" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-red-500">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-1.5">Playstyle Focus</label>
                    <select id="reg-style" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-red-500 text-slate-300">
                        <option value="Java / Lifesteal">Java / Lifesteal SMP</option>
                        <option value="Bedrock / Factions">Bedrock / Factions</option>
                        <option value="Speedrunner">Speedrunner</option>
                        <option value="PvP Minigames">PvP Minigames</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-red-600 to-orange-500 text-white font-bold py-3 rounded-xl transition-all text-sm shadow-md hover:brightness-110">Link Profile</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        const firestoreImportUrl = "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const { getFirestore: fs, collection: coll, doc: d, setDoc: sd, onSnapshot: os, updateDoc: ud, deleteDoc: dd, increment: inc } = await import(firestoreImportUrl);

        const firebaseConfig = {
            apiKey: "AIzaSyAu31P9_fYebyc05OH31K6sxZ1POgeYjVE",
            authDomain: "pgcwebsite.firebaseapp.com",
            projectId: "pgcwebsite",
            storageBucket: "pgcwebsite.firebasestorage.app",
            messagingSenderId: "335632389340",
            appId: "1:335632389340:web:d21defb70d032c934a5019"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = fs(app);
        const googleProvider = new GoogleAuthProvider();

        let currentUserData = null;
        let globalCreatorsCache = [];
        let isAdmin = false;

        document.getElementById('btn-login').addEventListener('click', async () => {
            try { await signInWithPopup(auth, googleProvider); } catch (err) { console.error(err); }
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                isAdmin = (user.email && user.email.toLowerCase() === 'densityv22@gmail.com');
                document.getElementById('btn-login').classList.add('hidden');
                document.getElementById('user-profile-badge').classList.remove('hidden');
                document.getElementById('user-avatar').src = user.photoURL;
                document.getElementById('user-display-name').textContent = user.displayName;

                const userRef = d(db, "users", user.uid);
                os(userRef, async (userSnap) => {
                    if (!userSnap.exists()) {
                        currentUserData = { uid: user.uid, displayName: user.displayName, photoURL: user.photoURL, role: isAdmin ? "admin" : "standard", votesLeft: 1, ownedChannelId: null };
                        await sd(userRef, currentUserData);
                    } else {
                        const data = userSnap.data();
                        let targetMax = data.role === 'premium' ? 3 : (isAdmin ? 999 : 1);
                        
                        if (currentUserData && currentUserData.role === 'standard' && data.role === 'premium') {
                            let updatedVotes = (data.votesLeft || 0) + 2; 
                            await ud(userRef, { role: "premium", votesLeft: updatedVotes });
                            data.votesLeft = updatedVotes;
                        }
                        
                        if (data.votesLeft === undefined) {
                            await ud(userRef, { votesLeft: targetMax });
                            data.votesLeft = targetMax;
                        }
                        currentUserData = data;
                    }
                    
                    if (isAdmin || !currentUserData.ownedChannelId) {
                        document.getElementById('btn-register-channel').className = "flex items-center gap-2 px-4 py-2 rounded-xl bg-slate-800 text-sm font-semibold";
                    } else {
                        document.getElementById('btn-register-channel').classList.add('hidden');
                    }
                    updateVoteBadgeUI();
                    buildLeaderboardUI();
                });
            } else {
                document.getElementById('btn-login').classList.remove('hidden');
                document.getElementById('user-profile-badge').classList.add('hidden');
                document.getElementById('btn-register-channel').classList.add('hidden');
                currentUserData = null;
                isAdmin = false;
                buildLeaderboardUI();
            }
        });

        function updateVoteBadgeUI() {
            if (!currentUserData) return;
            const role = currentUserData.role || 'standard';
            let badgeStyle = "bg-emerald-400 text-slate-950";
            if (role === 'premium') badgeStyle = "bg-purple-500 text-white";
            if (role === 'admin') badgeStyle = "bg-red-500 text-white";
            document.getElementById('user-vote-status').innerHTML = `<span class="px-1.5 py-0.5 rounded text-[10px] font-bold ${badgeStyle}">${role.toUpperCase()}</span> <span class="text-slate-400 ml-0.5">(${isAdmin ? "∞" : currentUserData.votesLeft} Left)</span>`;
        }

        os(coll(db, "youtubers"), (snapshot) => {
            globalCreatorsCache = [];
            snapshot.forEach(doc => globalCreatorsCache.push({ id: doc.id, ...doc.data() }));
            buildLeaderboardUI();
        });

        document.getElementById('search-bar').addEventListener('input', () => buildLeaderboardUI());

        function buildLeaderboardUI() {
            const grid = document.getElementById('creator-grid');
            const podiumContainer = document.getElementById('podium-container');
            const searchTerm = document.getElementById('search-bar').value.toLowerCase();

            let filtered = globalCreatorsCache.filter(c => 
                (c.name && c.name.toLowerCase().includes(searchTerm)) || (c.ign && c.ign.toLowerCase().includes(searchTerm))
            ).sort((a, b) => b.votes - a.votes);

            if (filtered.length === 0) {
                podiumContainer.innerHTML = '';
                grid.innerHTML = `<div class="col-span-full text-center py-12 text-slate-500 text-sm">No channels matched.</div>`;
                return;
            }

            let top3 = filtered.slice(0, 3);
            let others = filtered.slice(3);
            
            // Build fixed 2-1-3 layout structure pattern for the podium showcase
            let podiumHtml = ["", "", ""];
            let orderMap = [1, 0, 2]; // 0: Second (#2), 1: First (#1), 2: Third (#3)
            
            top3.forEach((creator, index) => {
                const isSelf = currentUserData && currentUserData.ownedChannelId === creator.id;
                let cGlow = index === 0 ? "border-amber-500/40 bg-slate-900/80 shadow-xl" : "border-slate-800 bg-slate-900/40";
                let mCol = index === 0 ? "bg-amber-500 text-black" : (index === 1 ? "bg-slate-300 text-black" : "bg-amber-700 text-white");
                
                let adminCtrls = isAdmin ? `<div class="absolute top-2 right-2 flex gap-1 z-20"><button onclick="window.adminResetVotes('${creator.id}', event)" class="w-5 h-5 rounded bg-slate-950 text-orange-400 text-[9px] flex items-center justify-center"><i class="fa-solid fa-rotate-left"></i></button><button onclick="window.adminDeleteChannel('${creator.id}', event)" class="w-5 h-5 rounded bg-slate-950 text-red-500 text-[9px] flex items-center justify-center"><i class="fa-solid fa-trash-can"></i></button></div>` : "";

                let slotHtml = `
                    <div class="border ${cGlow} rounded-2xl p-4 flex flex-col items-center relative overflow-hidden w-full">
                        ${adminCtrls}
                        <div class="absolute top-2 left-2 ${mCol} rounded-full font-bold text-[10px] w-5 h-5 flex items-center justify-center">#${index+1}</div>
                        <img src="${creator.logoUrl}" class="w-14 h-14 rounded-xl object-cover mt-2 border border-slate-700 bg-slate-950" onerror="this.src='https://mc-heads.net/avatar/steve'">
                        <h4 class="font-bold text-white text-sm mt-2 truncate max-w-full">${creator.name}</h4>
                        <p class="text-[11px] text-slate-400">IGN: <span class="text-red-400 font-bold">${creator.ign}</span></p>
                        <span class="mt-1 text-[10px] bg-slate-800 text-slate-300 px-2 py-0.5 rounded-full font-semibold border border-slate-700/50">${creator.style || 'Java / Lifesteal'}</span>
                        <div class="w-full border-t border-slate-800/80 mt-3 pt-3 flex items-center justify-between text-xs">
                            <div><span class="text-[10px] text-slate-500 block">Score Balance</span><span class="font-bold text-white flex items-center gap-1"><i class="fa-solid fa-fire text-orange-500"></i>${creator.votes}</span></div>
                            ${(isSelf && !isAdmin) ? `<button disabled class="bg-slate-800 text-slate-600 px-3 py-1 rounded-lg text-[11px] font-medium cursor-not-allowed">Blocked</button>` : `<button onclick="window.castVote('${creator.id}')" class="bg-red-600 hover:bg-red-500 text-white px-3 py-1 rounded-lg text-[11px] font-bold active:scale-95 transition-all">VOTE</button>`}
                        </div>
                    </div>
                `;
                
                if (top3.length === 3) {
                    podiumHtml[orderMap[index]] = slotHtml;
                } else {
                    podiumHtml[index] = slotHtml;
                }
            });

            podiumContainer.innerHTML = podiumHtml.filter(html => html !== "").join('');
            grid.innerHTML = '';

            others.forEach((creator, index) => {
                const isSelf = currentUserData && currentUserData.ownedChannelId === creator.id;
                let adminRow = isAdmin ? `<button onclick="window.adminResetVotes('${creator.id}', event)" class="w-5 h-5 text-orange-400"><i class="fa-solid fa-rotate-left text-[10px]"></i></button><button onclick="window.adminDeleteChannel('${creator.id}', event)" class="w-5 h-5 text-red-500"><i class="fa-solid fa-trash-can text-[10px]"></i></button>` : "";

                grid.innerHTML += `
                    <div class="creator-card border border-slate-800/60 bg-slate-900/20 rounded-xl p-4 flex items-center justify-between">
                        <div class="flex items-center gap-3 min-w-0">
                            <span class="font-bold text-slate-600 text-xs w-4">#${index + 4}</span>
                            <img src="${creator.logoUrl}" class="w-10 h-10 rounded-lg object-cover border border-slate-700 bg-slate-950" onerror="this.src='https://mc-heads.net/avatar/steve'">
                            <div class="min-w-0">
                                <h4 class="font-bold text-white text-xs truncate">${creator.name}</h4>
                                <p class="text-[10px] text-slate-400 truncate">IGN: ${creator.ign}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3 shrink-0">
                            ${adminRow}
                            <span class="text-xs font-bold text-slate-300 flex items-center gap-0.5"><i class="fa-solid fa-fire text-orange-500 text-[10px]"></i>${creator.votes}</span>
                            ${(isSelf && !isAdmin) ? `<button disabled class="bg-slate-800 text-slate-600 px-2.5 py-1 rounded text-[10px] cursor-not-allowed">Blocked</button>` : `<button onclick="window.castVote('${creator.id}')" class="bg-slate-800 hover:bg-red-600 text-slate-200 px-2.5 py-1 rounded text-[10px] font-bold transition-all">VOTE</button>`}
                        </div>
                    </div>
                `;
            });
        }

        window.castVote = async function(channelId) {
            if (!auth.currentUser || !currentUserData) return alert("Log in to vote.");
            if (!isAdmin && currentUserData.votesLeft <= 0) return alert("Out of votes!");
            if (!isAdmin && currentUserData.ownedChannelId === channelId) return alert("Cannot vote for your own profile card!");
            try {
                if (!isAdmin) {
                    await ud(d(db, "users", auth.currentUser.uid), { votesLeft: inc(-1) });
                    currentUserData.votesLeft -= 1;
                    updateVoteBadgeUI();
                }
                await ud(d(db, "youtubers", channelId), { votes: inc(1) });
            } catch (err) { console.error(err); }
        };

        document.getElementById('channel-registration-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!auth.currentUser) return;
            const ignValue = document.getElementById('reg-ign').value.trim();
            const channelId = isAdmin ? `ch_${auth.currentUser.uid}_${Date.now()}` : `ch_${auth.currentUser.uid}`;
            const mcLogoUrl = `https://mc-heads.net/avatar/${ignValue}`;

            try {
                await sd(d(db, "youtubers", channelId), { 
                    name: auth.currentUser.displayName, 
                    logoUrl: mcLogoUrl, 
                    ign: ignValue, 
                    style: document.getElementById('reg-style').value, 
                    votes: 0, 
                    ownerUid: auth.currentUser.uid 
                });
                if (!isAdmin) await ud(d(db, "users", auth.currentUser.uid), { ownedChannelId: channelId });
                closeRegisterModal();
            } catch (err) { console.error(err); }
        });

        window.adminResetVotes = async function(id, e) { if(e) e.stopPropagation(); if(isAdmin && confirm("Reset votes?")) await ud(d(db, "youtubers", id), { votes: 0 }); };
        window.adminDeleteChannel = async function(id, e) { if(e) e.stopPropagation(); if(isAdmin && confirm("Delete entry?")) await dd(d(db, "youtubers", id)); };
        window.openRegisterModal = function() { document.getElementById('register-modal').classList.remove('hidden'); }
        window.closeRegisterModal = function() { document.getElementById('register-modal').classList.add('hidden'); }
    </script>
</body>
</html>
