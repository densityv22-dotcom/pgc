<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PK Craft Hub | Channel Leaderboard</title>
    <meta name="google-site-verification" content="rZ6D-OMLgqRw6SOFJanKTfowRrYiSUWr2CWue3IObQ4" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f19; overflow-x: hidden; }
        .text-gradient { background: linear-gradient(135deg, #ff0055 0%, #ff5500 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .creator-card { transition: all 0.4s ease; }
        .creator-card:hover { transform: translateY(-8px); }
        .shimmer {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: loading-shimmer 1.5s infinite linear;
        }
        @keyframes loading-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col">

    <!-- Header / Navbar -->
    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-gradient-to-tr from-red-600 to-orange-500 p-2 rounded-xl text-white">
                    <i class="fa-solid fa-cubes text-xl"></i>
                </div>
                <span class="font-extrabold text-xl tracking-tight text-white">PK<span class="text-red-500">Craft</span>Hub</span>
            </div>
            
            <div class="flex items-center gap-6">
                <nav class="flex items-center gap-6">
                    <a href="index.html" class="text-sm font-bold text-red-500 border-b-2 border-red-500 pb-1">Leaderboard</a>
                    <a href="videos.html" class="text-sm font-medium text-slate-400 hover:text-white transition-colors">Trending Videos</a>
                </nav>

                <button id="btn-register-channel" onclick="openRegisterModal()" class="hidden items-center gap-2 px-4 py-2 rounded-xl bg-slate-800 hover:bg-slate-700 text-sm font-semibold transition-all border border-slate-700/50">
                    <i class="fa-solid fa-square-plus text-red-500"></i> Register Channel
                </button>

                <button id="btn-login" class="flex items-center gap-2 px-5 py-2.5 rounded-xl bg-red-600 hover:bg-red-500 text-sm font-bold transition-all text-white shadow-lg shadow-red-600/20">
                    <i class="fa-brands fa-google"></i> Login
                </button>

                <div id="user-profile-badge" class="hidden items-center gap-3 bg-slate-800/80 p-1.5 pr-4 rounded-full border border-slate-700/50">
                    <img id="user-avatar" src="" alt="Avatar" class="w-8 h-8 rounded-full">
                    <div class="text-xs">
                        <p id="user-display-name" class="font-bold text-slate-200">Loading...</p>
                        <p id="user-vote-status" class="text-emerald-400 font-medium"></p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Grid Content -->
    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="text-center max-w-2xl mx-auto mb-16">
            <span class="bg-red-500/10 text-red-400 text-xs font-bold px-3 py-1.5 rounded-full border border-red-500/20 uppercase inline-block mb-3">Community Leaderboard</span>
            <h1 class="text-4xl sm:text-5xl font-extrabold tracking-tight text-white mb-4">
                Pakistani Minecraft <br><span class="text-gradient">Creator Standings</span>
            </h1>
        </div>

        <!-- Search -->
        <div class="max-w-md mx-auto mb-12">
            <input type="text" id="search-bar" placeholder="Search YouTuber or In-game Name..." class="w-full bg-slate-900/60 border border-slate-800 rounded-2xl px-5 py-3.5 text-sm text-white focus:outline-none focus:border-red-500">
        </div>

        <!-- Top 3 Podium Boxes -->
        <div id="podium-container" class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-4xl mx-auto mb-16 items-end"></div>

        <div class="border-t border-slate-900 my-8"></div>

        <!-- Grid Cards Content -->
        <div id="creator-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="shimmer h-48 rounded-2xl border border-slate-800/50"></div>
            <div class="shimmer h-48 rounded-2xl border border-slate-800/50"></div>
            <div class="shimmer h-48 rounded-2xl border border-slate-800/50"></div>
        </div>
    </main>

    <!-- Modal Box -->
    <div id="register-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-slate-900 border border-slate-800 rounded-3xl max-w-md w-full p-6 relative">
            <button onclick="closeRegisterModal()" class="absolute right-5 top-5 text-slate-500 hover:text-slate-300"><i class="fa-solid fa-xmark text-xl"></i></button>
            <h3 class="text-xl font-bold text-white mb-4"><i class="fa-brands fa-youtube text-red-500 mr-2"></i>Register Profile</h3>
            <form id="channel-registration-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">Minecraft IGN</label>
                    <input type="text" id="reg-ign" required placeholder="e.g., GetBetterLt3" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-red-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">Playstyle Focus</label>
                    <select id="reg-style" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-red-500 text-slate-300">
                        <option value="Java / Lifesteal">Java / Lifesteal SMP</option>
                        <option value="Bedrock / Factions">Bedrock / Factions</option>
                        <option value="Speedrunner">Speedrunner</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-red-600 to-orange-500 text-white font-bold py-3 rounded-xl text-sm">Publish Profile</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAu31P9_fYebyc05OH31K6sxZ1POgeYjVE",
            authDomain: "pgcwebsite.firebaseapp.com",
            projectId: "pgcwebsite",
            storageBucket: "pgcwebsite.firebasestorage.app",
            messagingSenderId: "335632389340",
            appId: "1:335632389340:web:d21defb70d032c934a5019"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        let currentUserData = null;
        let globalCreatorsCache = [];

        document.getElementById('btn-login').addEventListener('click', async () => {
            try { await signInWithPopup(auth, googleProvider); } catch (err) { console.error(err); }
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('btn-login').classList.add('hidden');
                document.getElementById('user-profile-badge').classList.remove('hidden');
                document.getElementById('btn-register-channel').classList.remove('hidden');
                document.getElementById('btn-register-channel').classList.add('flex');
                document.getElementById('user-avatar').src = user.photoURL;
                document.getElementById('user-display-name').textContent = user.displayName;

                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);

                if (!userSnap.exists()) {
                    currentUserData = { uid: user.uid, displayName: user.displayName, photoURL: user.photoURL, role: "standard", votesLeft: 1, ownedChannelId: null };
                    await setDoc(userRef, currentUserData);
                } else {
                    currentUserData = userSnap.data();
                }
                updateVoteBadgeUI();
            } else {
                document.getElementById('btn-login').classList.remove('hidden');
                document.getElementById('user-profile-badge').classList.add('hidden');
                document.getElementById('btn-register-channel').classList.add('hidden');
                currentUserData = null;
            }
            buildLeaderboardUI(); 
        });

        function updateVoteBadgeUI() {
            if (!currentUserData) return;
            document.getElementById('user-vote-status').textContent = `VOTES: ${currentUserData.votesLeft}`;
        }

        onSnapshot(collection(db, "youtubers"), (snapshot) => {
            globalCreatorsCache = [];
            snapshot.forEach(doc => globalCreatorsCache.push({ id: doc.id, ...doc.data() }));
            buildLeaderboardUI();
        }, (err) => { buildLeaderboardUI(); });

        document.getElementById('search-bar').addEventListener('input', () => buildLeaderboardUI());

        function buildLeaderboardUI() {
            const grid = document.getElementById('creator-grid');
            const podiumContainer = document.getElementById('podium-container');
            const searchTerm = document.getElementById('search-bar').value.toLowerCase();

            let filtered = globalCreatorsCache.filter(c => 
                (c.name && c.name.toLowerCase().includes(searchTerm)) || (c.ign && c.ign.toLowerCase().includes(searchTerm))
            );
            filtered.sort((a, b) => b.votes - a.votes);

            if (filtered.length === 0) {
                podiumContainer.innerHTML = '';
                grid.innerHTML = `<div class="col-span-full text-center py-12 text-slate-500 font-medium bg-slate-900/10 border border-slate-800/40 rounded-2xl">No channels registered yet!</div>`;
                return;
            }

            let top3 = filtered.slice(0, 3);
            let others = filtered.slice(3);
            let podiumHtml = ["", "", ""];
            let orderMap = [1, 0, 2];
            
            top3.forEach((creator, index) => {
                const isSelfOwned = currentUserData && currentUserData.ownedChannelId === creator.id;
                let slotHtml = `
                    <div class="border border-slate-800 bg-slate-900/40 rounded-3xl p-6 flex flex-col items-center relative overflow-hidden">
                        <span class="absolute top-3 left-3 bg-red-600 text-white text-xs px-2 py-0.5 rounded font-bold">#${index+1}</span>
                        <img src="${creator.logoUrl || ''}" class="w-16 h-16 rounded-2xl object-cover border border-slate-700">
                        <h4 class="font-extrabold text-white mt-3">${creator.name || 'Unknown'}</h4>
                        <p class="text-xs text-red-400 font-mono font-bold">IGN: ${creator.ign || 'N/A'}</p>
                        <div class="w-full border-t border-slate-800/60 mt-4 pt-4 flex items-center justify-between">
                            <span class="text-sm font-black text-white"><i class="fa-solid fa-fire text-orange-500 mr-1"></i>${creator.votes || 0}</span>
                            ${isSelfOwned ? `<button disabled class="bg-slate-800 text-slate-500 px-3 py-1.5 rounded-xl text-xs cursor-not-allowed">Own</button>` : `<button onclick="window.castVote('${creator.id}')" class="bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded-xl text-xs font-black">VOTE</button>`}
                        </div>
                    </div>
                `;
                if (top3.length === 3) podiumHtml[orderMap[index]] = slotHtml;
                else podiumHtml[index] = slotHtml;
            });

            podiumContainer.innerHTML = podiumHtml.join('');
            grid.innerHTML = '';

            others.forEach((creator, index) => {
                const isSelfOwned = currentUserData && currentUserData.ownedChannelId === creator.id;
                grid.innerHTML += `
                    <div class="border border-slate-800 bg-slate-900/20 rounded-2xl p-5 flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <span class="font-black text-slate-600 text-sm">#${index + 4}</span>
                            <img src="${creator.logoUrl || ''}" class="w-12 h-12 rounded-xl object-cover">
                            <div>
                                <h4 class="font-bold text-white text-sm">${creator.name || 'Unknown'}</h4>
                                <p class="text-[11px] text-slate-400 font-mono">IGN: ${creator.ign || 'N/A'}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="text-sm font-black text-slate-200"><i class="fa-solid fa-heart text-red-500 text-xs mr-1"></i>${creator.votes || 0}</span>
                            ${isSelfOwned ? `<button disabled class="bg-slate-800 text-slate-500 px-2.5 py-1.5 rounded-lg text-[10px] cursor-not-allowed">Own</button>` : `<button onclick="window.castVote('${creator.id}')" class="bg-slate-800 hover:bg-red-600 text-slate-300 hover:text-white px-3 py-1.5 rounded-lg text-[10px] font-bold">VOTE</button>`}
                        </div>
                    </div>
                `;
            });
        }

        window.castVote = async function(channelId) {
            if (!auth.currentUser || !currentUserData) { alert("Please login first!"); return; }
            if (currentUserData.votesLeft <= 0) { alert("No votes left!"); return; }
            if (currentUserData.ownedChannelId === channelId) { alert("Can't vote for your own channel!"); return; }

            try {
                await updateDoc(doc(db, "users", auth.currentUser.uid), { votesLeft: increment(-1) });
                currentUserData.votesLeft -= 1;
                updateVoteBadgeUI();
                await updateDoc(doc(db, "youtubers", channelId), { votes: increment(1) });
            } catch (err) { console.error(err); }
        };

        document.getElementById('channel-registration-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!auth.currentUser || !currentUserData) return;
            const ign = document.getElementById('reg-ign').value;
            const style = document.getElementById('reg-style').value;
            const channelId = `ch_${auth.currentUser.uid}`;
            
            try {
                await setDoc(doc(db, "youtubers", channelId), { name: auth.currentUser.displayName, logoUrl: auth.currentUser.photoURL, ign: ign, style: style, votes: 0, ownerUid: auth.currentUser.uid });
                await updateDoc(doc(db, "users", auth.currentUser.uid), { ownedChannelId: channelId });
                currentUserData.ownedChannelId = channelId;
                closeRegisterModal();
            } catch (err) { console.error(err); }
        });

        window.openRegisterModal = function() { document.getElementById('register-modal').classList.remove('hidden'); }
        window.closeRegisterModal = function() { document.getElementById('register-modal').classList.add('hidden'); }
    </script>
</body>
</html>
