<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PK Craft Hub | Live Voting Directory</title>
    <meta name="google-site-verification" content="rZ6D-OMLgqRw6SOFJanKTfowRrYiSUWr2CWue3IObQ4" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <!-- Custom External Cache-Busting Stylesheet Linking -->
    <link rel="stylesheet" href="style.css?v=2.6">
</head>
<body>

    <!-- Custom Cursor Target Elements -->
    <div id="custom-cursor"></div>
    <div id="custom-cursor-blur"></div>

    <!-- Header / Navbar -->
    <header>
        <div class="max-width-container nav-container">
            <div class="logo-area animate__animated animate__fadeIn">
                <div class="logo-icon">
                    <i class="fa-solid fa-cubes"></i>
                </div>
                <span class="logo-text">PK<span class="logo-accent">Craft</span>Hub</span>
            </div>
            
            <div class="nav-actions animate__animated animate__fadeIn">
                <nav>
                    <a href="./index.html" class="link-active">Leaderboard</a>
                    <a href="./videos.html" class="link-inactive">Trending</a>
                </nav>

                <button id="btn-register-channel" onclick="openRegisterModal()" class="btn-secondary hidden">
                    <i class="fa-solid fa-square-plus"></i> <span>Register Channel</span>
                </button>

                <button id="btn-login" class="btn-primary">
                    <i class="fa-brands fa-google"></i> Login With Google
                </button>

                <div id="user-profile-badge" class="user-profile-badge hidden">
                    <img id="user-avatar" src="" alt="Avatar" class="user-avatar">
                    <div class="user-info-text">
                        <p id="user-display-name" class="user-display-name">Loading...</p>
                        <p id="user-vote-status" class="user-vote-status"></p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content Grid -->
    <main class="max-width-container">
        
        <!-- Hero Section Title -->
        <div class="hero-section animate__animated animate__fadeIn">
            <span class="version-pill">Community Hub v2.5</span>
            <h1>Pakistani Minecraft <br><span class="text-gradient">Creator Leaderboard</span></h1>
        </div>

        <!-- Directory Search Bar -->
        <div class="search-container animate__animated animate__fadeIn">
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="search-bar" placeholder="Search YouTuber or In-game Name...">
            </div>
        </div>

        <!-- 🏆 TOP 3 SHOWCASE PODIUM (#1 Left, #2 Middle, #3 Right Order) -->
        <div id="podium-container" class="animate__animated animate__fadeIn"></div>

        <div class="separator"></div>

        <!-- Full Layout Grid Standings -->
        <h3 class="section-heading"><i class="fa-solid fa-list-ol"></i> Full Directory Standings</h3>
        <div id="creator-grid">
            <div class="shimmer"></div>
            <div class="shimmer"></div>
            <div class="shimmer"></div>
            <div class="shimmer"></div>
        </div>
    </main>

    <!-- Connection Entry Modal Overlay Box -->
    <div id="register-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <button onclick="closeRegisterModal()" class="modal-close-btn">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <div class="modal-header">
                <h3><i class="fa-brands fa-youtube"></i> Connect Profile</h3>
            </div>
            <form id="channel-registration-form">
                <div class="form-group">
                    <label class="form-label">Minecraft IGN</label>
                    <input type="text" id="reg-ign" required placeholder="e.g., GetBetterLt3" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">Playstyle Focus</label>
                    <select id="reg-style" class="form-select">
                        <option value="Java / Lifesteal">Java / Lifesteal SMP</option>
                        <option value="Bedrock / Factions">Bedrock / Factions</option>
                        <option value="Speedrunner">Speedrunner</option>
                        <option value="PvP Minigames">PvP Minigames</option>
                    </select>
                </div>
                <button type="submit" class="btn-submit">Link Profile</button>
            </form>
        </div>
    </div>

    <!-- Framework & Application Integrations -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        const firestoreImportUrl = "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const { getFirestore: fs, collection: coll, doc: d, setDoc: sd, onSnapshot: os, updateDoc: ud, deleteDoc: dd, increment: inc } = await import(firestoreImportUrl);

        const firebaseConfig = {
            apiKey: "AIzaSyAu31P9_fYebyc05OH31K6sxZ1POgeYjVE",
            authDomain: "pgcwebsite.firebaseapp.com",
            projectId: "pgcwebsite",
            storageBucket: "pgcwebsite.firebasestorage.app",
            messagingSenderId: "335632389340",
            appId: "1:335632389340:web:d21defb70d032c934a5019"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = fs(app);
        const googleProvider = new GoogleAuthProvider();

        let currentUserData = null;
        let globalCreatorsCache = [];
        let isAdmin = false;

        // Custom Green Smooth Moving Cursor Script Component Logic
        const cursor = document.getElementById('custom-cursor');
        const cursorBlur = document.getElementById('custom-cursor-blur');
        if(cursor && cursorBlur) {
            document.addEventListener('mousemove', (e) => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
                setTimeout(() => {
                    cursorBlur.style.left = e.clientX + 'px';
                    cursorBlur.style.top = e.clientY + 'px';
                }, 30);
            });
        }

        document.getElementById('btn-login').addEventListener('click', async () => {
            try { await signInWithPopup(auth, googleProvider); } catch (err) { console.error(err); }
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                isAdmin = (user.email && user.email.toLowerCase() === 'densityv22@gmail.com');
                document.getElementById('btn-login').classList.add('hidden');
                document.getElementById('user-profile-badge').classList.remove('hidden');
                document.getElementById('user-avatar').src = user.photoURL;
                document.getElementById('user-display-name').textContent = user.displayName;

                const userRef = d(db, "users", user.uid);
                os(userRef, async (userSnap) => {
                    if (!userSnap.exists()) {
                        currentUserData = { uid: user.uid, displayName: user.displayName, photoURL: user.photoURL, role: isAdmin ? "admin" : "standard", votesLeft: 1, ownedChannelId: null };
                        await sd(userRef, currentUserData);
                    } else {
                        const data = userSnap.data();
                        let targetMax = data.role === 'premium' ? 3 : (isAdmin ? 999 : 1);
                        
                        if (currentUserData && currentUserData.role === 'standard' && data.role === 'premium') {
                            let updatedVotes = (data.votesLeft || 0) + 2; 
                            await ud(userRef, { role: "premium", votesLeft: updatedVotes });
                            data.votesLeft = updatedVotes;
                        }
                        
                        if (data.votesLeft === undefined) {
                            await ud(userRef, { votesLeft: targetMax });
                            data.votesLeft = targetMax;
                        }
                        currentUserData = data;
                    }
                    
                    if (isAdmin || !currentUserData.ownedChannelId) {
                        document.getElementById('btn-register-channel').classList.remove('hidden');
                    } else {
                        document.getElementById('btn-register-channel').classList.add('hidden');
                    }
                    updateVoteBadgeUI();
                    buildLeaderboardUI();
                });
            } else {
                document.getElementById('btn-login').classList.remove('hidden');
                document.getElementById('user-profile-badge').classList.add('hidden');
                document.getElementById('btn-register-channel').classList.add('hidden');
                currentUserData = null;
                isAdmin = false;
                buildLeaderboardUI();
            }
        });

        function updateVoteBadgeUI() {
            if (!currentUserData) return;
            const role = currentUserData.role || 'standard';
            let badgeStyle = "badge-standard";
            if (role === 'premium') badgeStyle = "badge-premium";
            if (role === 'admin') badgeStyle = "badge-admin";
            document.getElementById('user-vote-status').innerHTML = `<span class="badge-role ${badgeStyle}">${role.toUpperCase()}</span> <span style="color:#94a3b8; font-weight:700; margin-left:4px;">(${isAdmin ? "∞" : currentUserData.votesLeft} Left)</span>`;
        }

        os(coll(db, "youtubers"), (snapshot) => {
            globalCreatorsCache = [];
            snapshot.forEach(doc => globalCreatorsCache.push({ id: doc.id, ...doc.data() }));
            buildLeaderboardUI();
        });

        document.getElementById('search-bar').addEventListener('input', () => buildLeaderboardUI());

        function buildLeaderboardUI() {
            const grid = document.getElementById('creator-grid');
            const podiumContainer = document.getElementById('podium-container');
            const searchTerm = document.getElementById('search-bar').value.toLowerCase();

            let filtered = globalCreatorsCache.filter(c => 
                (c.name && c.name.toLowerCase().includes(searchTerm)) || (c.ign && c.ign.toLowerCase().includes(searchTerm))
            ).sort((a, b) => b.votes - a.votes);

            if (filtered.length === 0) {
                podiumContainer.innerHTML = '';
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding: 4rem 0; color:#475569; font-size:0.875rem;">No channels matched.</div>`;
                return;
            }

            let top3 = filtered.slice(0, 3);
            let others = filtered.slice(3);
            
            let podiumHtml = ["", "", ""];
            let orderMap = [0, 1, 2];
            
            top3.forEach((creator, index) => {
                const isSelf = currentUserData && currentUserData.ownedChannelId === creator.id;
                let cardClass = index === 0 ? "podium-card first-place" : "podium-card";
                let badgeClass = index === 0 ? "rank-badge rank-badge-1" : (index === 1 ? "rank-badge rank-badge-2" : "rank-badge rank-badge-3");
                
                let adminCtrls = isAdmin ? `<div class="admin-controls"><button onclick="window.adminResetVotes('${creator.id}', event)" class="admin-btn reset"><i class="fa-solid fa-rotate-left"></i></button><button onclick="window.adminDeleteChannel('${creator.id}', event)" class="admin-btn delete"><i class="fa-solid fa-trash-can"></i></button></div>` : "";

                let slotHtml = `
                    <div class="${cardClass}">
                        ${adminCtrls}
                        <div class="${badgeClass}">#${index+1}</div>
                        <img src="${creator.logoUrl}" class="podium-avatar" onerror="this.src='https://mc-heads.net/avatar/steve'">
                        <h4 class="podium-name">${creator.name}</h4>
                        <p class="podium-ign">IGN: <span>${creator.ign}</span></p>
                        <span class="playstyle-tag">${creator.style || 'Java / Lifesteal'}</span>
                        <div class="podium-footer">
                            <div><span class="score-title">Score Balance</span><span class="score-value"><i class="fa-solid fa-fire"></i>${creator.votes}</span></div>
                            ${(isSelf && !isAdmin) ? `<button disabled class="btn-blocked">Blocked</button>` : `<button onclick="window.castVote('${creator.id}')" class="btn-vote">VOTE</button>`}
                        </div>
                    </div>
                `;
                
                if (top3.length === 3) {
                    podiumHtml[orderMap[index]] = slotHtml;
                } else {
                    podiumHtml[index] = slotHtml;
                }
            });

            podiumContainer.innerHTML = podiumHtml.filter(html => html !== "").join('');
            grid.innerHTML = '';

            others.forEach((creator, index) => {
                const isSelf = currentUserData && currentUserData.ownedChannelId === creator.id;
                let adminRow = isAdmin ? `<button onclick="window.adminResetVotes('${creator.id}', event)" style="background:none; width:24px; height:24px; color:#34d399;"><i class="fa-solid fa-rotate-left" style="font-size:11px;"></i></button><button onclick="window.adminDeleteChannel('${creator.id}', event)" style="background:none; width:24px; height:24px; color:#ef4444;"><i class="fa-solid fa-trash-can" style="font-size:11px;"></i></button>` : "";

                grid.innerHTML += `
                    <div class="creator-card">
                        <div class="card-left-group">
                            <span class="card-rank-num">#${index + 4}</span>
                            <img src="${creator.logoUrl}" class="card-avatar" onerror="this.src='https://mc-heads.net/avatar/steve'">
                            <div class="card-text-block">
                                <h4 class="card-title">${creator.name}</h4>
                                <p class="card-subtitle">IGN: ${creator.ign}</p>
                            </div>
                        </div>
                        <div class="card-right-group">
                            ${adminRow}
                            <span class="card-score"><i class="fa-solid fa-fire"></i>${creator.votes}</span>
                            ${(isSelf && !isAdmin) ? `<button disabled class="btn-blocked">Blocked</button>` : `<button onclick="window.castVote('${creator.id}')" class="btn-secondary" style="padding:0.35rem 0.85rem; font-size:11px;">VOTE</button>`}
                        </div>
                    </div>
                `;
            });
        }

        window.castVote = async function(channelId) {
            if (!auth.currentUser || !currentUserData) return alert("Log in to vote.");
            if (!isAdmin && currentUserData.votesLeft <= 0) return alert("Out of votes!");
            if (!isAdmin && currentUserData.ownedChannelId === channelId) return alert("Cannot vote for your own profile card!");
            try {
                if (!isAdmin) {
                    await ud(d(db, "users", auth.currentUser.uid), { votesLeft: inc(-1) });
                    currentUserData.votesLeft -= 1;
                    updateVoteBadgeUI();
                }
                await ud(d(db, "youtubers", channelId), { votes: inc(1) });
            } catch (err) { console.error(err); }
        };

        document.getElementById('channel-registration-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!auth.currentUser) return;
            const ignValue = document.getElementById('reg-ign').value.trim();
            const channelId = isAdmin ? `ch_${auth.currentUser.uid}_${Date.now()}` : `ch_${auth.currentUser.uid}`;
            const mcLogoUrl = `https://mc-heads.net/avatar/${ignValue}`;

            try {
                await sd(d(db, "youtubers", channelId), { 
                    name: auth.currentUser.displayName, 
                    logoUrl: mcLogoUrl, 
                    ign: ignValue, 
                    style: document.getElementById('reg-style').value, 
                    votes: 0, 
                    ownerUid: auth.currentUser.uid 
                });
                if (!isAdmin) await ud(d(db, "users", auth.currentUser.uid), { ownedChannelId: channelId });
                closeRegisterModal();
            } catch (err) { console.error(err); }
        });

        window.adminDeleteChannel = async function(id, e) { 
            if(e) e.stopPropagation(); 
            if(isAdmin && confirm("Delete entry?")) {
                try {
                    globalCreatorsCache.forEach(async (creator) => {
                        if(creator.id === id) {
                            const ownerUid = creator.ownerUid;
                            if(ownerUid) {
                                await ud(d(db, "users", ownerUid), { ownedChannelId: null });
                            }
                        }
                    });
                    await dd(d(db, "youtubers", id)); 
                } catch(err) {
                    await dd(d(db, "youtubers", id));
                }
            }
        };
        
        window.adminResetVotes = async function(id, e) { if(e) e.stopPropagation(); if(isAdmin && confirm("Reset votes?")) await ud(d(db, "youtubers", id), { votes: 0 }); };
        window.openRegisterModal = function() { document.getElementById('register-modal').classList.remove('hidden'); }
        window.closeRegisterModal = function() { document.getElementById('register-modal').classList.add('hidden'); }
    </script>
</body>
</html>
