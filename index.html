<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PK Craft Hub | Live Voting Directory</title>
    <meta name="google-site-verification" content="rZ6D-OMLgqRw6SOFJanKTfowRrYiSUWr2CWue3IObQ4" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;600;700;800&display=swap');

        :root {
            --bg-dark: #070d0a;
            --emerald-glow: #10b981;
            --emerald-dark: #047857;
            --text-white: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at 50% -20%, rgba(16, 185, 129, 0.12) 0%, transparent 60%), 
                        linear-gradient(180deg, #0b1510 0%, var(--bg-dark) 100%) !important;
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            font-weight: 700;
        }

        ::selection {
            background-color: var(--emerald-glow);
            color: #030712;
        }

        .max-width-container {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .text-gradient { 
            background: linear-gradient(135deg, var(--emerald-glow) 0%, #34d399 100%) !important; 
            -webkit-background-clip: text !important; 
            -webkit-text-fill-color: transparent !important; 
        }

        /* Glassmorphism Header from Reference Look */
        header {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 40;
            height: 80px;
        }

        .nav-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 100%;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            background: linear-gradient(to top right, var(--emerald-glow), #34d399);
            padding: 0.6rem;
            border-radius: 0.75rem;
            color: #020617;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        .logo-text {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            color: #ffffff;
        }

        .logo-accent {
            color: var(--emerald-glow);
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        nav {
            display: none;
        }
        @media (min-width: 768px) {
            nav {
                display: flex;
                align-items: center;
                gap: 2rem;
            }
        }

        nav a {
            font-size: 0.9rem;
            text-decoration: none;
            font-weight: 700;
        }

        .link-active {
            color: var(--emerald-glow);
            border-bottom: 2px solid var(--emerald-glow);
            padding-bottom: 0.25rem;
        }

        .link-inactive {
            color: #94a3b8;
            transition: color 0.2s;
        }
        .link-inactive:hover {
            color: #ffffff;
        }

        button {
            font-family: inherit;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-secondary {
            gap: 0.5rem;
            padding: 0.65rem 1.25rem;
            background-color: rgba(255, 255, 255, 0.02);
            color: #f1f5f9;
            font-size: 0.875rem;
            border: 1px solid var(--glass-border);
        }
        .btn-secondary:hover {
            background-color: rgba(16, 185, 129, 0.05);
            border-color: var(--emerald-glow);
        }
        .btn-secondary i {
            color: var(--emerald-glow);
        }

        .btn-primary {
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, var(--emerald-glow) 0%, var(--emerald-dark) 100%);
            color: #030712;
            font-size: 0.875rem;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 25px rgba(16, 185, 129, 0.5);
        }

        .btn-vote {
            background: linear-gradient(135deg, var(--emerald-glow) 0%, var(--emerald-dark) 100%);
            color: #030712;
            padding: 0.5rem 1.25rem;
            font-size: 0.8rem;
            border-radius: 8px;
        }
        .btn-vote:hover { box-shadow: 0 0 12px rgba(16, 185, 129, 0.4); }

        .btn-blocked {
            background-color: rgba(255, 255, 255, 0.02);
            color: #475569;
            padding: 0.5rem 1.25rem;
            font-size: 0.8rem;
            border: 1px solid var(--glass-border);
            border-radius: 8px;
        }

        .user-profile-badge {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: var(--glass-bg);
            padding: 0.375rem 1.25rem 0.375rem 0.375rem;
            border-radius: 9999px;
            border: 1px solid var(--glass-border);
            max-width: 240px;
        }
        .user-avatar {
            width: 2.25rem;
            height: 2.25rem;
            border-radius: 9999px;
            object-fit: cover;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .user-info-text {
            font-size: 0.75rem;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }
        .user-display-name {
            color: #ffffff;
            font-weight: 800;
        }
        .user-vote-status {
            color: var(--emerald-glow);
            display: flex;
            align-items: center;
            gap: 0.25rem;
            margin-top: 0.125rem;
        }
        .badge-role {
            padding: 0.125rem 0.5rem;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 800;
        }
        .badge-standard { background-color: var(--emerald-glow); color: #020617; }
        .badge-premium { background-color: #8b5cf6; color: #ffffff; }
        .badge-admin { background-color: #ef4444; color: #ffffff; }

        main {
            flex-grow: 1;
            padding: 4rem 0;
        }

        .hero-section {
            text-align: center;
            max-width: 52rem;
            margin: 0 auto 3rem auto;
        }

        .version-pill {
            background-color: rgba(16, 185, 129, 0.08);
            color: var(--emerald-glow);
            font-size: 0.75rem;
            padding: 0.375rem 1.25rem;
            border-radius: 9999px;
            border: 1px solid rgba(16, 185, 129, 0.2);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 1.5rem;
        }

        h1 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 3rem;
            line-height: 1.15;
            color: #ffffff;
            font-weight: 800;
            letter-spacing: -0.03em;
        }
        @media (min-width: 640px) { h1 { font-size: 4rem; } }

        .search-container {
            max-width: 36rem;
            margin: 0 auto 4rem auto;
        }
        .search-wrapper { position: relative; }
        .search-icon {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: #475569;
        }
        #search-bar {
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 1rem 1.5rem 1rem 3.5rem;
            font-size: 1rem;
            color: #ffffff;
            outline: none;
            transition: all 0.3s;
        }
        #search-bar:focus { 
            border-color: var(--emerald-glow); 
            background: rgba(16, 185, 129, 0.02);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.1);
        }

        #podium-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            max-width: 1000px;
            margin: 0 auto 4rem auto;
            align-items: flex-end;
        }
        @media (min-width: 768px) { #podium-container { grid-template-columns: repeat(3, 1fr); } }

        .podium-card {
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
            width: 100%;
            transition: all 0.3s ease;
        }
        .podium-card:hover { 
            transform: translateY(-4px); 
            border-color: rgba(16, 185, 129, 0.3);
            background: rgba(16, 185, 129, 0.02);
        }
        .podium-card.first-place {
            border-color: var(--emerald-glow);
            background: linear-gradient(180deg, rgba(16, 185, 129, 0.05) 0%, rgba(255, 255, 255, 0.01) 100%);
            box-shadow: 0 20px 40px rgba(16, 185, 129, 0.08);
        }

        .admin-controls {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            display: flex;
            gap: 0.375rem;
            z-index: 20;
        }
        .admin-btn {
            width: 1.75rem;
            height: 1.75rem;
            border-radius: 6px;
            background-color: #0d1511;
            font-size: 11px;
            border: 1px solid var(--glass-border);
        }
        .admin-btn.reset { color: var(--emerald-glow); }
        .admin-btn.delete { color: #ef4444; }

        .rank-badge {
            position: absolute;
            top: 0.75rem;
            left: 0.75rem;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 800;
            width: 2rem;
            height: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .rank-badge-1 { background-color: var(--emerald-glow); color: #020617; }
        .rank-badge-2 { background-color: #cbd5e1; color: #020617; }
        .rank-badge-3 { background-color: #065f46; color: #ffffff; }

        .podium-avatar {
            width: 4.5rem;
            height: 4.5rem;
            border-radius: 1.25rem;
            object-fit: cover;
            margin-top: 0.75rem;
            border: 1px solid var(--glass-border);
            background-color: #0f172a;
        }

        .podium-name {
            font-size: 1.1rem;
            color: #ffffff;
            margin-top: 0.75rem;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        .podium-ign {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 0.125rem;
        }
        .podium-ign span { color: var(--emerald-glow); font-weight: 700; }

        .playstyle-tag {
            margin-top: 0.6rem;
            font-size: 10px;
            background-color: rgba(16, 185, 129, 0.08);
            color: var(--emerald-glow);
            padding: 0.25rem 0.75rem;
            border-radius: 6px;
            border: 1px solid rgba(16, 185, 129, 0.15);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .podium-footer {
            width: 100%;
            border-top: 1px solid var(--glass-border);
            margin-top: 1.25rem;
            padding-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.75rem;
        }

        .score-title {
            font-size: 10px;
            color: #64748b;
            display: block;
            text-transform: uppercase;
        }
        .score-value {
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 1rem;
            font-weight: 800;
        }
        .score-value i { color: var(--emerald-glow); filter: drop-shadow(0 0 5px var(--emerald-glow)); }

        .separator {
            border-top: 1px solid var(--glass-border);
            margin: 4rem 0;
        }

        .section-heading {
            font-size: 1.25rem;
            color: #ffffff;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .section-heading i { color: var(--emerald-glow); }

        #creator-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }
        @media (min-width: 640px) { #creator-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { #creator-grid { grid-template-columns: repeat(3, 1fr); } }

        .creator-card { 
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.01);
            border-radius: 1.25rem;
            padding: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s ease;
        }
        .creator-card:hover {
            border-color: rgba(16, 185, 129, 0.2);
            background: rgba(16, 185, 129, 0.01);
        }

        .card-left-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            min-width: 0;
        }
        .card-rank-num { color: #475569; font-size: 0.85rem; width: 1.5rem; }
        .card-avatar {
            width: 2.75rem;
            height: 2.75rem;
            border-radius: 0.75rem;
            object-fit: cover;
            border: 1px solid var(--glass-border);
        }
        .card-text-block { min-width: 0; }
        .card-title { color: #ffffff; font-size: 0.95rem; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .card-subtitle { font-size: 12px; color: #94a3b8; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; margin-top: 2px; }
        
        .card-right-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-shrink: 0;
        }
        .card-score { font-size: 1rem; font-weight: 800; color: #e2e8f0; display: flex; align-items: center; gap: 0.25rem; margin-right: 0.25rem; }
        .card-score i { color: var(--emerald-glow); }

        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0.01) 25%, rgba(255,255,255,0.04) 50%, rgba(255,255,255,0.01) 75%);
            background-size: 200% 100%;
            animation: loading-shimmer 1.5s infinite linear;
            height: 11rem;
            border-radius: 1.5rem;
            border: 1px solid var(--glass-border);
        }
        @keyframes loading-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(3, 7, 18, 0.85);
            backdrop-filter: blur(12px);
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal-box {
            background-color: #0b120f;
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            max-width: 28rem;
            width: 100%;
            padding: 2rem;
            position: relative;
        }
        .modal-close-btn { position: absolute; right: 1.5rem; top: 1.5rem; color: #64748b; background: none; font-size: 1.25rem; }

        .modal-header h3 {
            font-size: 1.5rem;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .modal-header h3 i { color: var(--emerald-glow); }

        .form-group { margin-bottom: 1.25rem; }
        .form-label { display: block; font-size: 0.75rem; text-transform: uppercase; color: #94a3b8; margin-bottom: 0.5rem; letter-spacing: 0.05em; }
        .form-input, .form-select {
            width: 100%;
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            color: #ffffff;
            outline: none;
            font-family: inherit;
        }
        .form-input:focus, .form-select:focus { border-color: var(--emerald-glow); }

        .btn-submit {
            width: 100%;
            background: linear-gradient(to right, var(--emerald-glow), #34d399);
            color: #020617;
            padding: 0.875rem;
            border-radius: 10px;
            text-transform: uppercase;
            margin-top: 0.5rem;
            font-weight: 800;
        }

        .hidden { display: none !important; }

        /* ADVANCED MAGNETIC CUSTOM CURSOR */
        @media (min-width: 1024px) {
            body, a, button, select, input, [onclick], .creator-card, .podium-card { 
                cursor: none !important; 
            }
            .custom-cursor-dot {
                width: 6px !important; 
                height: 6px !important; 
                background-color: var(--emerald-glow) !important; 
                border-radius: 50% !important;
                position: fixed !important; 
                transform: translate(-50%, -50%) !important; 
                pointer-events: none !important; 
                z-index: 99999 !important;
                box-shadow: 0 0 10px var(--emerald-glow), 0 0 20px var(--emerald-dark) !important;
                display: block !important;
            }
            .custom-cursor-aura {
                width: 36px !important; 
                height: 36px !important; 
                border: 1.5px solid rgba(16, 185, 129, 0.4) !important; 
                border-radius: 50% !important;
                position: fixed !important; 
                transform: translate(-50%, -50%) !important; 
                pointer-events: none !important; 
                z-index: 99998 !important;
                transition: transform 0.08s ease-out, width 0.2s, height 0.2s, background-color 0.2s !important;
                display: block !important;
            }
            body.cursor-hover .custom-cursor-dot {
                width: 4px !important;
                height: 4px !important;
                background-color: #ffffff !important;
                box-shadow: 0 0 8px #ffffff !important;
            }
            body.cursor-hover .custom-cursor-aura {
                width: 52px !important;
                height: 52px !important;
                border-color: var(--emerald-glow) !important;
                background-color: rgba(16, 185, 129, 0.08) !important;
                box-shadow: 0 0 15px rgba(16, 185, 129, 0.15) !important;
            }
        }
    </style>
</head>
<body>

    <div class="custom-cursor-dot" id="custom-cursor"></div>
    <div class="custom-cursor-aura" id="custom-cursor-blur"></div>

    <header>
        <div class="max-width-container nav-container">
            <div class="logo-area animate__animated animate__fadeIn">
                <div class="logo-icon"><i class="fa-solid fa-cubes"></i></div>
                <span class="logo-text">PK<span class="logo-accent">Craft</span>Hub</span>
            </div>
            
            <div class="nav-actions animate__animated animate__fadeIn">
                <nav>
                    <a href="./index.html" class="link-active">Leaderboard</a>
                    <a href="./videos.html" class="link-inactive">Trending</a>
                </nav>

                <button id="btn-register-channel" onclick="openRegisterModal()" class="btn-secondary hidden">
                    <i class="fa-solid fa-square-plus"></i> <span>Register Channel</span>
                </button>

                <button id="btn-login" class="btn-primary">
                    <i class="fa-brands fa-google"></i> Login With Google
                </button>

                <div id="user-profile-badge" class="user-profile-badge hidden">
                    <img id="user-avatar" src="" alt="Avatar" class="user-avatar">
                    <div class="user-info-text">
                        <p id="user-display-name" class="user-display-name">Loading...</p>
                        <p id="user-vote-status" class="user-vote-status"></p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-width-container">
        <div class="hero-section animate__animated animate__fadeIn">
            <span class="version-pill">Community Hub v2.5</span>
            <h1>Pakistani Minecraft <br><span class="text-gradient">Creator Leaderboard</span></h1>
        </div>

        <div class="search-container animate__animated animate__fadeIn">
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="search-bar" placeholder="Search YouTuber or In-game Name...">
            </div>
        </div>

        <div id="podium-container" class="animate__animated animate__fadeIn"></div>

        <div class="separator"></div>

        <h3 class="section-heading"><i class="fa-solid fa-list-ol"></i> Full Directory Standings</h3>
        <div id="creator-grid">
            <div class="shimmer"></div>
            <div class="shimmer"></div>
            <div class="shimmer"></div>
        </div>
    </main>

    <div id="register-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <button onclick="closeRegisterModal()" class="modal-close-btn"><i class="fa-solid fa-xmark"></i></button>
            <div class="modal-header"><h3><i class="fa-brands fa-youtube"></i> Connect Profile</h3></div>
            <form id="channel-registration-form">
                <div class="form-group">
                    <label class="form-label">Minecraft IGN</label>
                    <input type="text" id="reg-ign" required placeholder="e.g., GetBetterLt3" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">Playstyle Focus</label>
                    <select id="reg-style" class="form-select">
                        <option value="Java / Lifesteal">Java / Lifesteal SMP</option>
                        <option value="Bedrock / Factions">Bedrock / Factions</option>
                        <option value="Speedrunner">Speedrunner</option>
                        <option value="PvP Minigames">PvP Minigames</option>
                    </select>
                </div>
                <button type="submit" class="btn-submit">Link Profile</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        const firestoreImportUrl = "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const { getFirestore: fs, collection: coll, doc: d, setDoc: sd, onSnapshot: os, updateDoc: ud, deleteDoc: dd, increment: inc } = await import(firestoreImportUrl);

        const firebaseConfig = {
            apiKey: "AIzaSyAu31P9_fYebyc05OH31K6sxZ1POgeYjVE",
            authDomain: "pgcwebsite.firebaseapp.com",
            projectId: "pgcwebsite",
            storageBucket: "pgcwebsite.firebasestorage.app",
            messagingSenderId: "335632389340",
            appId: "1:335632389340:web:d21defb70d032c934a5019"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = fs(app);
        const googleProvider = new GoogleAuthProvider();

        let currentUserData = null;
        let globalCreatorsCache = [];
        let isAdmin = false;

        // Custom Cursor Motion Control
        const cursor = document.getElementById('custom-cursor');
        const cursorBlur = document.getElementById('custom-cursor-blur');
        if(cursor && cursorBlur) {
            document.addEventListener('mousemove', (e) => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
                cursorBlur.style.left = e.clientX + 'px';
                cursorBlur.style.top = e.clientY + 'px';
            });
        }

        // Handle dynamically checking hover triggers for custom cursor styles
        function syncCursorHovers() {
            const targets = document.querySelectorAll('a, button, select, input, [onclick], .creator-card, .podium-card');
            targets.forEach(t => {
                t.removeEventListener('mouseenter', addHoverState);
                t.removeEventListener('mouseleave', removeHoverState);
                t.addEventListener('mouseenter', addHoverState);
                t.addEventListener('mouseleave', removeHoverState);
            });
        }
        function addHoverState() { document.body.classList.add('cursor-hover'); }
        function removeHoverState() { document.body.classList.remove('cursor-hover'); }

        document.getElementById('btn-login').addEventListener('click', async () => {
            try { await signInWithPopup(auth, googleProvider); } catch (err) { console.error(err); }
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                isAdmin = (user.email && user.email.toLowerCase() === 'densityv22@gmail.com');
                document.getElementById('btn-login').classList.add('hidden');
                document.getElementById('user-profile-badge').classList.remove('hidden');
                document.getElementById('user-avatar').src = user.photoURL;
                document.getElementById('user-display-name').textContent = user.displayName;

                const userRef = d(db, "users", user.uid);
                os(userRef, async (userSnap) => {
                    if (!userSnap.exists()) {
                        currentUserData = { uid: user.uid, displayName: user.displayName, photoURL: user.photoURL, role: isAdmin ? "admin" : "standard", votesLeft: 1, ownedChannelId: null };
                        await sd(userRef, currentUserData);
                    } else {
                        const data = userSnap.data();
                        let targetMax = data.role === 'premium' ? 3 : (isAdmin ? 999 : 1);
                        if (currentUserData && currentUserData.role === 'standard' && data.role === 'premium') {
                            let updatedVotes = (data.votesLeft || 0) + 2;
                            await ud(userRef, { role: "premium", votesLeft: updatedVotes });
                            data.votesLeft = updatedVotes;
                        }
                        if (data.votesLeft === undefined) {
                            await ud(userRef, { votesLeft: targetMax });
                            data.votesLeft = targetMax;
                        }
                        currentUserData = data;
                    }
                    if (isAdmin || !currentUserData.ownedChannelId) {
                        document.getElementById('btn-register-channel').classList.remove('hidden');
                    } else {
                        document.getElementById('btn-register-channel').classList.add('hidden');
                    }
                    updateVoteBadgeUI();
                    buildLeaderboardUI();
                });
            } else {
                document.getElementById('btn-login').classList.remove('hidden');
                document.getElementById('user-profile-badge').classList.add('hidden');
                document.getElementById('btn-register-channel').classList.add('hidden');
                currentUserData = null;
                isAdmin = false;
                buildLeaderboardUI();
            }
        });

        function updateVoteBadgeUI() {
            if (!currentUserData) return;
            const role = currentUserData.role || 'standard';
            let badgeStyle = "badge-standard";
            if (role === 'premium') badgeStyle = "badge-premium";
            if (role === 'admin') badgeStyle = "badge-admin";
            document.getElementById('user-vote-status').innerHTML = `<span class="badge-role ${badgeStyle}">${role.toUpperCase()}</span> <span style="color:#94a3b8; font-weight:700; margin-left:4px;">(${isAdmin ? "∞" : currentUserData.votesLeft} Left)</span>`;
        }

        os(coll(db, "youtubers"), (snapshot) => {
            globalCreatorsCache = [];
            snapshot.forEach(doc => globalCreatorsCache.push({ id: doc.id, ...doc.data() }));
            buildLeaderboardUI();
        });

        document.getElementById('search-bar').addEventListener('input', () => buildLeaderboardUI());

        function buildLeaderboardUI() {
            const grid = document.getElementById('creator-grid');
            const podiumContainer = document.getElementById('podium-container');
            const searchTerm = document.getElementById('search-bar').value.toLowerCase();

            let filtered = globalCreatorsCache.filter(c => 
                (c.name && c.name.toLowerCase().includes(searchTerm)) || (c.ign && c.ign.toLowerCase().includes(searchTerm))
            ).sort((a, b) => b.votes - a.votes);

            if (filtered.length === 0) {
                podiumContainer.innerHTML = '';
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding: 4rem 0; color:#475569; font-size:0.875rem;">No channels matched.</div>`;
                syncCursorHovers();
                return;
            }

            let top3 = filtered.slice(0, 3);
            let others = filtered.slice(3);
            let podiumHtml = ["", "", ""];
            let orderMap = [1, 0, 2]; // #2 on Left, #1 in Center, #3 on Right Structure
            
            if (top3.length < 3) {
                orderMap = [0, 1, 2];
            }

            top3.forEach((creator, index) => {
                const isSelf = currentUserData && currentUserData.ownedChannelId === creator.id;
                let cardClass = index === 0 ? "podium-card first-place" : "podium-card";
                let badgeClass = index === 0 ? "rank-badge rank-badge-1" : (index === 1 ? "rank-badge rank-badge-2" : "rank-badge rank-badge-3");
                let adminCtrls = isAdmin ? `<div class="admin-controls"><button onclick="window.adminResetVotes('${creator.id}', event)" class="admin-btn reset"><i class="fa-solid fa-rotate-left"></i></button><button onclick="window.adminDeleteChannel('${creator.id}', event)" class="admin-btn delete"><i class="fa-solid fa-trash-can"></i></button></div>` : "";

                let slotHtml = `
                    <div class="${cardClass}">
                        ${adminCtrls}
                        <div class="${badgeClass}">#${index+1}</div>
                        <img src="${creator.logoUrl}" class="podium-avatar" onerror="this.src='https://mc-heads.net/avatar/steve'">
                        <h4 class="podium-name">${creator.name}</h4>
                        <p class="podium-ign">IGN: <span>${creator.ign}</span></p>
                        <span class="playstyle-tag">${creator.style || 'Java / Lifesteal'}</span>
                        <div class="podium-footer">
                            <div><span class="score-title">Score Balance</span><span class="score-value"><i class="fa-solid fa-fire"></i>${creator.votes}</span></div>
                            ${(isSelf && !isAdmin) ? `<button disabled class="btn-blocked">Blocked</button>` : `<button onclick="window.castVote('${creator.id}')" class="btn-vote">VOTE</button>`}
                        </div>
                    </div>
                `;
                if (top3.length === 3) { podiumHtml[orderMap[index]] = slotHtml; } else { podiumHtml[index] = slotHtml; }
            });

            podiumContainer.innerHTML = podiumHtml.filter(html => html !== "").join('');
            grid.innerHTML = '';

            others.forEach((creator, index) => {
                const isSelf = currentUserData && currentUserData.ownedChannelId === creator.id;
                let adminRow = isAdmin ? `<button onclick="window.adminResetVotes('${creator.id}', event)" style="background:none; width:24px; height:24px; color:var(--emerald-glow);"><i class="fa-solid fa-rotate-left" style="font-size:11px;"></i></button><button onclick="window.adminDeleteChannel('${creator.id}', event)" style="background:none; width:24px; height:24px; color:#ef4444;"><i class="fa-solid fa-trash-can" style="font-size:11px;"></i></button>` : "";

                grid.innerHTML += `
                    <div class="creator-card">
                        <div class="card-left-group">
                            <span class="card-rank-num">#${index + 4}</span>
                            <img src="${creator.logoUrl}" class="card-avatar" onerror="this.src='https://mc-heads.net/avatar/steve'">
                            <div class="card-text-block">
                                <h4 class="card-title">${creator.name}</h4>
                                <p class="card-subtitle">IGN: ${creator.ign}</p>
                            </div>
                        </div>
                        <div class="card-right-group">
                            ${adminRow}
                            <span class="card-score"><i class="fa-solid fa-fire"></i>${creator.votes}</span>
                            ${(isSelf && !isAdmin) ? `<button disabled class="btn-blocked">Blocked</button>` : `<button onclick="window.castVote('${creator.id}')" class="btn-secondary" style="padding:0.4rem 1rem; font-size:11px; border-radius:8px;">VOTE</button>`}
                        </div>
                    </div>
                `;
            });
            syncCursorHovers();
        }

        window.castVote = async function(channelId) {
            if (!auth.currentUser || !currentUserData) return alert("Log in to vote.");
            if (!isAdmin && currentUserData.votesLeft <= 0) return alert("Out of votes!");
            if (!isAdmin && currentUserData.ownedChannelId === channelId) return alert("Cannot vote for your own profile card!");
            try {
                if (!isAdmin) {
                    await ud(d(db, "users", auth.currentUser.uid), { votesLeft: inc(-1) });
                    currentUserData.votesLeft -= 1;
                    updateVoteBadgeUI();
                }
                await ud(d(db, "youtubers", channelId), { votes: inc(1) });
            } catch (err) { console.error(err); }
        };

        document.getElementById('channel-registration-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!auth.currentUser) return;
            const ignValue = document.getElementById('reg-ign').value.trim();
            const channelId = isAdmin ? `ch_${auth.currentUser.uid}_${Date.now()}` : `ch_${auth.currentUser.uid}`;
            const mcLogoUrl = `https://mc-heads.net/avatar/${ignValue}`;

            try {
                await sd(d(db, "youtubers", channelId), { 
                    name: auth.currentUser.displayName, 
                    logoUrl: mcLogoUrl, 
                    ign: ignValue, 
                    style: document.getElementById('reg-style').value, 
                    votes: 0, 
                    ownerUid: auth.currentUser.uid 
                });
                if (!isAdmin) await ud(d(db, "users", auth.currentUser.uid), { ownedChannelId: channelId });
                closeRegisterModal();
            } catch (err) { console.error(err); }
        });

        window.adminDeleteChannel = async function(id, e) { 
            if(e) e.stopPropagation(); 
            if(isAdmin && confirm("Delete entry?")) {
                try {
                    globalCreatorsCache.forEach(async (creator) => {
                        if(creator.id === id) {
                            const ownerUid = creator.ownerUid;
                            if(ownerUid) { await ud(d(db, "users", ownerUid), { ownedChannelId: null }); }
                        }
                    });
                    await dd(d(db, "youtubers", id)); 
                } catch(err) { await dd(d(db, "youtubers", id)); }
            }
        };
        
        window.adminResetVotes = async function(id, e) { if(e) e.stopPropagation(); if(isAdmin && confirm("Reset votes?")) await ud(d(db, "youtubers", id), { votes: 0 }); };
        window.openRegisterModal = function() { document.getElementById('register-modal').classList.remove('hidden'); }
        window.closeRegisterModal = function() { document.getElementById('register-modal').classList.add('hidden'); }
    </script>
</body>
</html>
