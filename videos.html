<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PK Craft Hub | Trending Videos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #060b11 !important; 
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            font-weight: 800;
        }

        .max-width-container {
            max-width: 2560px;
            width: 100%;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .text-gradient { 
            background: linear-gradient(135deg, #10b981 0%, #059669 100%) !important; 
            -webkit-background-clip: text !important; 
            -webkit-text-fill-color: transparent !important; 
        }

        header {
            border-bottom: 1px solid rgba(30, 41, 59, 0.8);
            background-color: rgba(2, 6, 23, 0.7);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 40;
            height: 80px;
        }

        .nav-container { display: flex; align-items: center; justify-content: space-between; height: 100%; }
        .logo-area { display: flex; align-items: center; gap: 0.75rem; }
        .logo-icon {
            background: linear-gradient(to top right, #059669, #34d399);
            padding: 0.6rem; border-radius: 0.75rem; color: #020617;
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.2);
        }
        .logo-text { font-size: 1.5rem; font-weight: 800; color: #ffffff; }
        .logo-accent { color: #34d399; }
        
        .nav-actions { display: flex; align-items: center; gap: 1.5rem; }
        nav { display: none; }
        @media (min-width: 768px) { nav { display: flex; align-items: center; gap: 2rem; } }
        nav a { font-size: 0.875rem; text-decoration: none; font-weight: 800; }
        .link-active { color: #34d399; border-bottom: 2px solid #34d399; padding-bottom: 0.25rem; }
        .link-inactive { color: #94a3b8; }
        .link-inactive:hover { color: #ffffff; }

        button { font-family: inherit; border: none; border-radius: 9999px; font-weight: 800; display: inline-flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .btn-secondary { gap: 0.5rem; padding: 0.6rem 1rem; background-color: #0f172a; color: #f1f5f9; font-size: 0.875rem; border: 1px solid #1e293b; }
        .btn-secondary:hover { border-color: rgba(16, 185, 129, 0.5); }
        .btn-secondary i { color: #34d399; }
        .btn-primary { gap: 0.5rem; padding: 0.75rem 1.5rem; background-color: #10b981; color: #020617; font-size: 0.875rem; }

        .user-profile-badge { display: flex; align-items: center; gap: 0.75rem; background-color: #0f172a; padding: 0.375rem 1.25rem 0.375rem 0.375rem; border-radius: 9999px; border: 1px solid #1e293b; max-width: 220px; }
        .user-avatar { width: 2.25rem; height: 2.25rem; border-radius: 9999px; object-fit: cover; border: 1px solid rgba(16, 185, 129, 0.3); }
        .user-info-text { font-size: 0.75rem; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .user-display-name { color: #ffffff; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .user-vote-status { color: #34d399; display: flex; align-items: center; gap: 0.25rem; }
        .badge-role { padding: 0.125rem 0.5rem; border-radius: 9999px; font-size: 10px; }
        .badge-standard { background-color: #34d399; color: #020617; }
        .badge-premium { background-color: #8b5cf6; color: #ffffff; }
        .badge-admin { background-color: #059669; color: #ffffff; }

        main { flex-grow: 1; padding: 3rem 0; }
        .hero-section { text-align: center; max-width: 48rem; margin: 0 auto 4rem auto; }
        h1 { font-size: 2.5rem; line-height: 1.2; color: #ffffff; }
        @media (min-width: 640px) { h1 { font-size: 3.75rem; } }

        #video-grid {
            display: grid; grid-template-columns: 1fr; gap: 2rem; margin-top: 2rem;
        }
        @media (min-width: 640px) { #video-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { #video-grid { grid-template-columns: repeat(3, 1fr); } }

        .video-card {
            background-color: rgba(2, 6, 23, 0.4); border: 1px solid rgba(30, 41, 59, 0.8);
            border-radius: 1.25rem; overflow: hidden; display: flex; flex-direction: column;
            position: relative; transition: transform 0.2s;
        }
        .video-card:hover { transform: translateY(-4px); border-color: rgba(16, 185, 129, 0.4); }

        .thumbnail-container { position: relative; width: 100%; padding-top: 56.25%; background-color: #020617; }
        .thumbnail-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        
        .video-info { padding: 1.25rem; display: flex; flex-direction: column; flex-grow: 1; }
        .video-meta { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; }
        
        .channel-logo { width: 2rem; height: 2rem; border-radius: 50%; border: 1px solid #1e293b; object-fit: cover; }
        .channel-name { font-size: 0.825rem; color: #34d399; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .video-title { font-size: 0.95rem; color: #ffffff; line-height: 1.4; margin-bottom: 1rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 2.8rem; }
        
        .video-footer { display: flex; align-items: center; justify-content: space-between; margin-top: auto; border-top: 1px solid #0f172a; padding-top: 0.75rem; }
        .upvote-btn { background-color: #0f172a; border: 1px solid #1e293b; color: #94a3b8; padding: 0.4rem 1rem; font-size: 0.75rem; gap: 0.375rem; }
        .upvote-btn:hover:not(:disabled) { border-color: #10b981; color: #34d399; }
        .upvote-btn.voted { background-color: #10b981; color: #020617; border-color: #10b981; }
        
        .upvote-count { font-size: 0.875rem; color: #f1f5f9; display: flex; align-items: center; gap: 0.25rem; }
        .upvote-count i { color: #34d399; }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); z-index: 50; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .modal-box { background-color: #020617; border: 1px solid rgba(30, 41, 59, 0.8); border-radius: 1.5rem; max-width: 28rem; width: 100%; padding: 1.75rem; position: relative; }
        .modal-close-btn { position: absolute; right: 1.5rem; top: 1.5rem; color: #64748b; background: none; }
        .modal-header h3 { font-size: 1.5rem; color: #ffffff; display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem; }
        .modal-header h3 i { color: #10b981; }
        .form-group { margin-bottom: 1.25rem; }
        .form-label { display: block; font-size: 0.75rem; text-transform: uppercase; color: #94a3b8; margin-bottom: 0.5rem; }
        .form-input { width: 100%; background-color: #0f172a; border: 1px solid #1e293b; border-radius: 0.75rem; padding: 0.75rem 1rem; font-size: 0.875rem; color: #ffffff; outline: none; }
        .btn-submit { width: 100%; background: linear-gradient(to right, #059669, #34d399); color: #020617; padding: 0.875rem; border-radius: 0.75rem; text-transform: uppercase; margin-top: 0.5rem; }

        .admin-action-overlay { position: absolute; top: 0.5rem; right: 0.5rem; z-index: 10; display: flex; gap: 0.25rem; }
        .admin-del-btn { width: 1.5rem; height: 1.5rem; background-color: #020617; color: #ef4444; border: 1px solid #1e293b; border-radius: 50%; font-size: 10px; }

        .hidden { display: none !important; }

        /* FIXED EMERALD CUSTOM CURSOR SYSTEM */
        @media (min-width: 1024px) {
            body, a, button, select, input, [onclick] { 
                cursor: none !important; 
            }
            #custom-cursor { 
                width: 8px !important; 
                height: 8px !important; 
                background-color: #10b981 !important; 
                border-radius: 50% !important; 
                position: fixed !important; 
                transform: translate(-50%, -50%) !important; 
                pointer-events: none !important; 
                z-index: 99999 !important; 
                box-shadow: 0 0 10px #10b981, 0 0 20px #059669 !important; 
                display: block !important;
            }
            #custom-cursor-blur { 
                width: 32px !important; 
                height: 32px !important; 
                border: 2px solid rgba(16, 185, 129, 0.6) !important; 
                border-radius: 50% !important; 
                position: fixed !important; 
                transform: translate(-50%, -50%) !important; 
                pointer-events: none !important; 
                z-index: 99998 !important; 
                transition: transform 0.08s ease-out !important; 
                display: block !important;
            }
        }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <div id="custom-cursor-blur"></div>

    <header>
        <div class="max-width-container nav-container">
            <div class="logo-area">
                <div class="logo-icon"><i class="fa-solid fa-cubes"></i></div>
                <span class="logo-text">PK<span class="logo-accent">Craft</span>Hub</span>
            </div>
            
            <div class="nav-actions">
                <nav>
                    <a href="./index.html" class="link-inactive">Leaderboard</a>
                    <a href="./videos.html" class="link-active">Trending</a>
                </nav>

                <button id="btn-add-video" onclick="openVideoModal()" class="btn-secondary hidden">
                    <i class="fa-solid fa-plus"></i> <span>Submit Video</span>
                </button>

                <button id="btn-login" class="btn-primary">
                    <i class="fa-brands fa-google"></i> Login With Google
                </button>

                <div id="user-profile-badge" class="user-profile-badge hidden">
                    <img id="user-avatar" src="" alt="Avatar" class="user-avatar">
                    <div class="user-info-text">
                        <p id="user-display-name" class="user-display-name">Loading...</p>
                        <p id="user-vote-status" class="user-vote-status"></p>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-width-container">
        <div class="hero-section animate__animated animate__fadeIn">
            <h1>Trending Community <br><span class="text-gradient">Showcase Videos</span></h1>
        </div>

        <div id="video-grid">
            <div class="shimmer" style="height: 18rem;"></div>
            <div class="shimmer" style="height: 18rem;"></div>
            <div class="shimmer" style="height: 18rem;"></div>
        </div>
    </main>

    <div id="video-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <button onclick="closeVideoModal()" class="modal-close-btn"><i class="fa-solid fa-xmark"></i></button>
            <div class="modal-header"><h3><i class="fa-solid fa-video"></i> Share Showcase Video</h3></div>
            <form id="video-submission-form">
                <div class="form-group">
                    <label class="form-label">YouTube Video URL</label>
                    <input type="url" id="video-url" required placeholder="https://www.youtube.com/watch?v=..." class="form-input">
                </div>
                <button type="submit" class="btn-submit">Publish Video</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        const firestoreImportUrl = "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const { getFirestore: fs, collection: coll, doc: d, setDoc: sd, onSnapshot: os, updateDoc: ud, deleteDoc: dd, increment: inc, arrayUnion: au, arrayRemove: ar } = await import(firestoreImportUrl);

        const firebaseConfig = {
            apiKey: "AIzaSyAu31P9_fYebyc05OH31K6sxZ1POgeYjVE",
            authDomain: "pgcwebsite.firebaseapp.com",
            projectId: "pgcwebsite",
            storageBucket: "pgcwebsite.firebasestorage.app",
            messagingSenderId: "335632389340",
            appId: "1:335632389340:web:d21defb70d032c934a5019"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = fs(app);
        const googleProvider = new GoogleAuthProvider();

        let currentUserData = null;
        let globalVideosCache = [];
        let isAdmin = false;

        const cursor = document.getElementById('custom-cursor');
        const cursorBlur = document.getElementById('custom-cursor-blur');
        if(cursor && cursorBlur) {
            document.addEventListener('mousemove', (e) => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
                cursorBlur.style.left = e.clientX + 'px';
                cursorBlur.style.top = e.clientY + 'px';
            });
        }

        document.getElementById('btn-login').addEventListener('click', async () => {
            try { await signInWithPopup(auth, googleProvider); } catch (err) { console.error(err); }
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                isAdmin = (user.email && user.email.toLowerCase() === 'densityv22@gmail.com');
                document.getElementById('btn-login').classList.add('hidden');
                document.getElementById('user-profile-badge').classList.remove('hidden');
                document.getElementById('user-avatar').src = user.photoURL;
                document.getElementById('user-display-name').textContent = user.displayName;

                const userRef = d(db, "users", user.uid);
                os(userRef, async (userSnap) => {
                    if (!userSnap.exists()) {
                        currentUserData = { uid: user.uid, displayName: user.displayName, photoURL: user.photoURL, role: isAdmin ? "admin" : "standard", ownedChannelId: null };
                        await sd(userRef, currentUserData);
                    } else {
                        currentUserData = userSnap.data();
                    }
                    document.getElementById('btn-add-video').classList.remove('hidden');
                    updateVoteBadgeUI();
                    buildVideosUI();
                });
            } else {
                document.getElementById('btn-login').classList.remove('hidden');
                document.getElementById('user-profile-badge').classList.add('hidden');
                document.getElementById('btn-add-video').classList.add('hidden');
                currentUserData = null;
                isAdmin = false;
                buildVideosUI();
            }
        });

        function updateVoteBadgeUI() {
            if (!currentUserData) return;
            const role = currentUserData.role || 'standard';
            let badgeStyle = "badge-standard";
            if (role === 'premium') badgeStyle = "badge-premium";
            if (role === 'admin') badgeStyle = "badge-admin";
            document.getElementById('user-vote-status').innerHTML = `<span class="badge-role ${badgeStyle}">${role.toUpperCase()}</span>`;
        }

        os(coll(db, "videos"), (snapshot) => {
            globalVideosCache = [];
            snapshot.forEach(doc => globalVideosCache.push({ id: doc.id, ...doc.data() }));
            buildVideosUI();
        });

        function buildVideosUI() {
            const grid = document.getElementById('video-grid');
            let sorted = [...globalVideosCache].sort((a, b) => (b.upvotes || 0) - (a.upvotes || 0));

            if (sorted.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding: 4rem 0; color:#475569;">No shared videos yet.</div>`;
                return;
            }

            grid.innerHTML = '';
            sorted.forEach(video => {
                const hasVoted = currentUserData && video.voters && video.voters.includes(currentUserData.uid);
                let btnClass = hasVoted ? "upvote-btn voted" : "upvote-btn";
                let adminControls = isAdmin ? `<div class="admin-action-overlay"><button onclick="window.adminDeleteVideo('${video.id}', event)" class="admin-del-btn"><i class="fa-solid fa-trash-can"></i></button></div>` : "";

                grid.innerHTML += `
                    <div class="video-card">
                        ${adminControls}
                        <div class="thumbnail-container">
                            <iframe class="thumbnail-img" src="https://www.youtube.com/embed/${video.youtubeId}" frameborder="0" allowfullscreen></iframe>
                        </div>
                        <div class="video-info">
                            <div class="video-meta">
                                <img src="${video.channelLogo || 'https://mc-heads.net/avatar/steve'}" class="channel-logo">
                                <span class="channel-name">${video.uploaderName}</span>
                            </div>
                            <h4 class="video-title">${video.title || "Minecraft Gameplay Showcase"}</h4>
                            <div class="video-footer">
                                <span class="upvote-count"><i class="fa-solid fa-fire"></i>${video.upvotes || 0}</span>
                                <button onclick="window.toggleUpvote('${video.id}')" class="${btnClass}">
                                    <i class="fa-solid fa-thumbs-up"></i> <span>${hasVoted ? 'Voted' : 'Upvote'}</span>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        window.toggleUpvote = async function(videoId) {
            if (!auth.currentUser) return alert("Log in to upvote videos.");
            const videoRef = d(db, "videos", videoId);
            const video = globalVideosCache.find(v => v.id === videoId);
            if (!video) return;

            const hasVoted = video.voters && video.voters.includes(auth.currentUser.uid);
            try {
                if (hasVoted) {
                    await ud(videoRef, { upvotes: inc(-1), voters: ar(auth.currentUser.uid) });
                } else {
                    await ud(videoRef, { upvotes: inc(1), voters: au(auth.currentUser.uid) });
                }
            } catch (err) { console.error(err); }
        };

        document.getElementById('video-submission-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!auth.currentUser) return;

            const urlVal = document.getElementById('video-url').value.trim();
            let regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            let match = urlVal.match(regExp);
            let yid = (match && match[2].length === 11) ? match[2] : null;

            if (!yid) return alert("Invalid YouTube URL format.");

            const docId = `vid_${yid}`;
            try {
                await sd(d(db, "videos", docId), {
                    youtubeId: yid,
                    uploaderUid: auth.currentUser.uid,
                    uploaderName: auth.currentUser.displayName,
                    channelLogo: auth.currentUser.photoURL,
                    upvotes: 0,
                    voters: [],
                    title: "Minecraft Community Spotlight Video",
                    timestamp: Date.now()
                });
                closeVideoModal();
            } catch (err) { console.error(err); }
        });

        window.adminDeleteVideo = async function(id, e) {
            if(e) e.stopPropagation();
            if(isAdmin && confirm("Delete video submission?")) {
                try { await dd(d(db, "videos", id)); } catch(err) { console.error(err); }
            }
        };

        window.openVideoModal = function() { document.getElementById('video-modal').classList.remove('hidden'); }
        window.closeVideoModal = function() { document.getElementById('video-modal').classList.add('hidden'); }
    </script>
</body>
</html>
